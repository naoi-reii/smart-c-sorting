{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartC Calamansi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#046307',
                        secondary: '#f3f4f6',
                        dark: {
                            bg: '#111827',
                            card: '#1f2937',
                            border: '#374151',
                            text: '#f9fafb',
                            muted: '#9ca3af'
                        }
                    },
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-white dark:bg-dark-bg min-h-screen flex items-center justify-center p-4 transition-colors duration-200">
    <div class="w-full max-w-md bg-white dark:bg-dark-card rounded-2xl dark:border-dark-border overflow-hidden">
        <div class="p-8">
            <div class="flex justify-center mb-8">
                <img src="{% static 'app/logo.png' %}" alt="SmartC Logo" class="h-16 w-auto object-contain hidden dark:block">
                <img src="{% static 'app/logo.png' %}" alt="SmartC Logo" class="h-16 w-auto object-contain block dark:hidden">
            </div>
            <h2 class="text-2xl font-bold text-center text-gray-900 dark:text-white mb-2">S.M.A.R.T C</h2>
            <p class="text-sm text-center text-gray-500 dark:text-dark-muted mb-8">Sensor-based Monitoring and Automated Reflectance Testing for Citrus</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-600 dark:bg-red-900/20 text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 dark:text-dark-muted uppercase tracking-widest mb-1.5" for="username">Username</label>
                    <input type="text" id="username" name="username" required
                        class="w-full bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-dark-border rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 dark:text-dark-muted uppercase tracking-widest mb-1.5" for="password">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-dark-border rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full px-2 py-2 bg-primary text-white text-sm font-bold rounded-xl hover:opacity-90 transition-all uppercase tracking-widest">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
