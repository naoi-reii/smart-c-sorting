{% extends "app/base.html" %}

{% block content %}
<div class="-mx-8 -my-8 min-h-[calc(100vh)] flex flex-col">
    <!-- Header -->
    <div class="px-8 pt-8 mb-6">
        <h2 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">Settings</h2>
    </div>

    <!-- Main Layout Area -->
    <div class="flex-1 border-t border-gray-200 dark:border-dark-border flex flex-col md:flex-row">
        <!-- Sidebar Navigation for Settings -->
        <div class="w-full md:w-72 border-b md:border-b-0 md:border-r border-gray-200 dark:border-dark-border p-8 flex-shrink-0">
            <h3 class="text-[11px] font-bold text-gray-500 dark:text-dark-muted uppercase tracking-widest mb-6">General Settings</h3>
            <nav class="space-y-2">
                <a href="#" class="flex items-center space-x-3 px-4 py-2 bg-primary text-white rounded-lg font-medium shadow-sm text-ui-base">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span>Account</span>
                </a>
            </nav>
        </div>

        <!-- Main Settings Content -->
        <div class="flex-1 border-r border-gray-200 dark:border-dark-border p-8">
            <div class="max-w-3xl">
                <!-- Profile Section -->
                <div class="mb-12">
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">My Profile</h3>
                    <div class="border-t border-gray-200 dark:border-dark-border mb-8"></div>
                    
                    <div class="flex items-center space-x-6 mb-8">
                        <!-- Avatar Placeholder -->
                        <div class="w-20 h-20 bg-gray-200 dark:bg-gray-700 rounded-full flex-shrink-0 overflow-hidden">
                            <!-- Using a blank background matching the screenshot -->
                        </div>
                        <div>
                            <div class="flex space-x-3 mb-2">
                                <button class="px-4 py-2 bg-primary text-white text-xs font-medium rounded-lg flex items-center hover:opacity-90 transition-opacity shadow-sm">
                                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                    Change Image
                                </button>
                                <button class="px-4 py-2 bg-white dark:bg-dark-card border border-gray-200 dark:border-dark-border text-gray-700 dark:text-white text-xs font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors shadow-sm">
                                    Remove Image
                                </button>
                            </div>
                            <p class="text-xs font-medium text-gray-500 dark:text-dark-muted">Supports JPEGs, PNG, under 2MB</p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[11px] font-bold text-gray-500 dark:text-dark-muted uppercase tracking-widest mb-2">Username</label>
                        <div class="flex items-center space-x-4">
                            <input type="text" class="w-full max-w-md bg-transparent border border-gray-300 dark:border-dark-border rounded-lg px-4 py-2 text-ui-base dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" value="{{ request.user.username|default:'' }}">
                            <button class="px-4 py-2 bg-primary text-white text-ui-tiny font-medium rounded-lg hover:opacity-90 shadow-sm shadow-primary/20 transition-all whitespace-nowrap">
                                Change Username
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Security Section -->
                <div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Account Security</h3>
                    <div class="border-t border-gray-200 dark:border-dark-border mb-8"></div>

                    <div class="space-y-8">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 dark:text-dark-muted uppercase tracking-widest mb-2">Email</label>
                            <div class="flex items-center space-x-4">
                                <input type="email" class="w-full max-w-md bg-transparent border border-gray-300 dark:border-dark-border rounded-lg px-4 py-2 text-ui-base dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" value="{{ request.user.email|default:'' }}">
                                <button class="px-4 py-2 bg-primary text-white text-ui-tiny font-medium rounded-lg hover:opacity-90 shadow-sm shadow-primary/20 transition-all whitespace-nowrap">
                                    Change Email
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 dark:text-dark-muted uppercase tracking-widest mb-2">Password</label>
                            <div class="flex items-center space-x-4">
                                <input type="password" class="w-full max-w-md bg-transparent border border-gray-300 dark:border-dark-border rounded-lg px-4 py-2 text-ui-base dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" value="" placeholder="">
                                <button class="px-4 py-2 bg-primary text-white text-ui-tiny font-medium rounded-lg hover:opacity-90 shadow-sm shadow-primary/20 transition-all whitespace-nowrap">
                                    Change Password
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
