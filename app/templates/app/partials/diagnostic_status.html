<div class="space-y-4">
    <div class="flex items-center justify-between p-4 rounded-lg bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-dark-border">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 rounded-lg bg-white dark:bg-dark-card flex items-center justify-center border border-gray-200 dark:border-dark-border">
                <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
                </svg>
            </div>
            <div>
                <h3 class="text-ui-base font-semibold text-gray-900 dark:text-white">{{ device.name }}</h3>
                <p class="text-ui-tiny text-gray-500 dark:text-dark-muted">IP: {{ device.ip_address|default:"--" }}</p>
            </div>
        </div>

        <div class="flex flex-col items-end">
            {% if is_online %}
                <span class="px-3 py-1 rounded-full bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-ui-tiny font-bold uppercase tracking-wider">
                    Connected
                </span>
                <p class="text-[10px] text-gray-400 mt-1 italic">Last seen: {{ device.last_seen|date:"H:i:s" }}</p>
            {% else %}
                <span class="px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 text-ui-tiny font-bold uppercase tracking-wider">
                    Offline
                </span>
                <p class="text-[10px] text-gray-400 mt-1 italic">
                    Last seen: {{ device.last_seen|date:"M d, H:i" }}
                </p>
            {% endif %}
        </div>
    </div>
</div>
